<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ document.title }} · Local Semantic Search</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>{{ document.title }}</h1>
          <p>{{ document.filename }}</p>
        </div>
        <a class="button-link" href="/">Search</a>
      </header>

      <article class="document-detail">
        <pre>{{ document.text }}</pre>
      </article>
    </main>
  </body>
</html>
